name: DMHelper CI Linux Workflow

on:
  push:
    branches: [ master, feature/linux-port ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  SOURCE_DIR: ${{ github.workspace }}
  QT_VERSION: 6.6.0
  APPIMAGE_NAME: DMHelper-x86_64.AppImage

jobs:
  build-DMH-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxcb-xinerama0 \
          libxcb-cursor0 \
          squashfs-tools \
          fuse \
          libfuse2

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        modules: 'qtimageformats qtmultimedia qtnetworkauth'
        archives: 'qttranslations qttools qtsvg qtbase icu'

    - name: Check out the DMHelper source tree
      uses: actions/checkout@v4

    - name: Download and extract VLC 4 snap
      run: |
        wget -q https://artifacts.videolan.org/vlc/nightly-snap/20260420-0440/vlc_4.0.0-dev-36688-g3462acc0a9_amd64.snap
        unsquashfs -q vlc_4.0.0-dev-36688-g3462acc0a9_amd64.snap
        rm vlc_4.0.0-dev-36688-g3462acc0a9_amd64.snap

    - name: Build DMHelper
      run: |
        cmake -S DMHelper/src -B DMHelper/build-release -DCMAKE_BUILD_TYPE=Release
        cmake --build DMHelper/build-release --config Release -j$(nproc)

    - name: Prepare AppDir structure
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib/vlc/plugins
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        # Copy the built binary
        cp DMHelper/build-release/DMHelper AppDir/usr/bin/

        # Copy resources, bestiary, and doc directories
        cp -r DMHelper/src/resources AppDir/usr/bin/resources
        cp -r DMHelper/src/bestiary AppDir/usr/bin/bestiary
        cp -r DMHelper/src/doc AppDir/usr/bin/doc

        # Copy VLC 4 libraries from snap
        cp -P squashfs-root/usr/lib/libvlc.so* AppDir/usr/lib/
        cp -P squashfs-root/usr/lib/libvlccore.so* AppDir/usr/lib/

        # Copy VLC 4 plugins from snap
        cp -r squashfs-root/usr/lib/vlc/plugins/* AppDir/usr/lib/vlc/plugins/

        # Copy desktop file and icon
        cp DMHelper/src/data/linux/DMHelper.desktop AppDir/usr/share/applications/
        cp DMHelper/src/data/linux/DMHelper.desktop AppDir/
        cp DMHelper/src/data/dmhelper_small.png AppDir/usr/share/icons/hicolor/256x256/apps/DMHelper.png
        cp DMHelper/src/data/dmhelper_small.png AppDir/DMHelper.png

    - name: Download linuxdeploy
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Create AppImage
      run: |
        export QMAKE=$(which qmake)
        # Run linuxdeploy to bundle Qt libs and plugins (without producing final AppImage yet)
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin qt \
          --desktop-file AppDir/DMHelper.desktop \
          --icon-file AppDir/DMHelper.png \
          --executable AppDir/usr/bin/DMHelper

        # Replace linuxdeploy's AppRun with our custom one that sets VLC_PLUGIN_PATH
        cp DMHelper/src/data/linux/AppRun.sh AppDir/AppRun
        chmod +x AppDir/AppRun

        # Now produce the final AppImage
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --output appimage

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APPIMAGE_NAME }}
        path: DMHelper-x86_64.AppImage
