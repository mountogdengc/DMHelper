name: DMHelper CI Windows Workflow

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Qt (MSVC 2022)
      # -------------------------
      - name: Install Qt 6.10.1 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.1
          arch: win64_msvc2022_64
          tools: tools_ifw
          tools_ifw_version: 4.10
          cache: true
          #dir: C:\

      # -------------------------
      # Ensure 7-Zip exists
      # (Windows runner already has it, but we assert it)
      # -------------------------
      - name: Verify 7-Zip
        run: |
          if (-not (Test-Path "C:\Program Files\7-Zip\7z.exe")) {
            throw "7-Zip not found"
          }

      # -------------------------
      # Check the full file tree
      # -------------------------
      - name: Debug Workspace output pre-build
        working-directory: ${{ runner.workspace }}
        run: |
          Get-ChildItem -Recurse -File

      # -------------------------
      # Run build & deploy script
      # -------------------------
      - name: Build DMHelper (MSVC Release)
        working-directory: ${{ github.workspace }}/DMHelper
        run: |
          # echo Runner Workspace is: ${{ runner.workspace }}
          # echo Github Workspace is: ${{ github.workspace }}
          Get-ChildItem -Recurse -File -Filter "buildanddeploy_msvc64_cmake.ps1"
          # Get-ChildItem -Recurse -File
          "y" | pwsh -NoProfile -ExecutionPolicy Bypass -File buildanddeploy_msvc64_cmake.ps1
      
      # -------------------------
      # Check the full file tree
      # -------------------------
      - name: Debug Workspace output post-build
        working-directory: ${{ runner.workspace }}
        run: |
          Get-ChildItem -Recurse -File

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DMHelper-Windows-Installer
          path: |
            DMHelper-64-bit-release-Installer.exe

      - name: Upload ZIP Distribution
        uses: actions/upload-artifact@v4
        with:
          name: DMHelper-Windows-Zip
          path: |
            DMHelper-64-bit-release.zip
