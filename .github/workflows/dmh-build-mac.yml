name: DMHelper CI macOS Workflow

on:
  push:
    branches: [ master, feature/linux-port ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    #runs-on: macos-15  # Apple Silicon runner (recommended)
    runs-on: macos-15-intel  # Intel Silicon runner (recommended)

    defaults:
      run:
        shell: bash

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Qt (macOS)
      # -------------------------
      - name: Install Qt 6.10.1 (macOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.1
          arch: clang_64
          tools: tools_ifw
          cache: true
          modules: qtmultimedia qtnetworkauth qtimageformats
          add-tools-to-path: true
          archives: qttranslations qttools qtsvg qtbase

      # -------------------------
      # Verify Qt tools
      # -------------------------
      - name: Verify Qt installation
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          which macdeployqt
          which binarycreator

      # -------------------------
      # Debug workspace (pre-build)
      # -------------------------
      - name: Debug Workspace output pre-build
        working-directory: ${{ runner.workspace }}
        run: |
          echo "runner.workspace === ${{ runner.workspace }}"
          echo "github.workspace === ${{ github.workspace }}"
          find . -type f

      # -------------------------
      # Ensure build script is executable
      # -------------------------
      - name: Make build script executable
        working-directory: ${{ github.workspace }}/DMHelper
        run: |
          chmod +x buildanddeploy_macos_cmake.sh
          ls -l buildanddeploy_macos_cmake.sh

      # -------------------------
      # Run build & deploy script
      # -------------------------
      - name: Build DMHelper (macOS Release)
        working-directory: ${{ github.workspace }}/DMHelper
        env:
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}
        run: |
          echo "y" | ./buildanddeploy_macos_cmake.sh

      # -------------------------
      # Debug workspace (post-build)
      # -------------------------
      - name: Debug Workspace output post-build
        working-directory: ${{ runner.workspace }}
        run: |
          find . -type f

      # -------------------------
      # Smoke-test the built application
      # -------------------------
      - name: Smoke-test built application
        working-directory: ${{ github.workspace }}/DMHelper
        run: |
          APP="bin-macos/packages/com.dmhelper.app/data/DMHelper.app"
          EXE="$APP/Contents/MacOS/DMHelper"
          if [ ! -f "$EXE" ]; then echo "DMHelper not found at $EXE"; exit 1; fi
          output=$("$EXE" --smoke-test --skip-opengl 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q '"passed"\s*:\s*false'; then
            echo "Smoke test reported failures"
            exit 1
          fi
          if ! echo "$output" | grep -q '"passed"\s*:\s*true'; then
            echo "Smoke test did not produce expected JSON output"
            exit 1
          fi
        env:
          QT_QPA_PLATFORM: offscreen

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DMHelper-macOS-Installer
          path: |
            DMHelper/DMHelper-macOS-Installer.app
          if-no-files-found: error

      - name: Upload ZIP Distribution
        uses: actions/upload-artifact@v4
        with:
          name: DMHelper-macOS-Zip
          path: |
            DMHelper/DMHelper-macOS-release.zip
          if-no-files-found: error
